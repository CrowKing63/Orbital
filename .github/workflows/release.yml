name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          # Determine if pre-release (contains -, e.g. v1.0.0-beta.1)
          if [[ "$VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version in csproj
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          $content = Get-Content Orbital.csproj -Raw
          $content = $content -replace '<Version>.*?</Version>', "<Version>$ver</Version>"
          $content = $content -replace '<AssemblyVersion>.*?</AssemblyVersion>', "<AssemblyVersion>$ver.0</AssemblyVersion>"
          $content = $content -replace '<FileVersion>.*?</FileVersion>', "<FileVersion>$ver.0</FileVersion>"
          Set-Content Orbital.csproj $content

      # ---------- Build installer (framework-dependent) ----------
      - name: Publish installer build
        run: |
          dotnet publish Orbital.csproj /p:PublishProfile=installer --configuration Release --no-self-contained --output publish/installer

      - name: Install Inno Setup 6
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' installer\Orbital.iss /DMyAppVersion=$ver
        shell: pwsh

      # ---------- Build portable (self-contained single-file) ----------
      - name: Publish portable build
        run: |
          dotnet publish Orbital.csproj /p:PublishProfile=portable --configuration Release --output publish/portable

      - name: Package portable zip
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          $folder = "Orbital-$ver"
          $staging = "publish/staging/$folder"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item publish/portable/Orbital.exe $staging
          Copy-Item portable/Cleanup.cmd $staging
          Compress-Archive -Path "publish/staging/$folder" -DestinationPath "dist/Orbital-$ver-Portable.zip"

      # ---------- Create GitHub Release ----------
      - name: List dist artifacts
        shell: pwsh
        run: |
          Write-Host "=== dist directory contents ==="
          if (Test-Path dist) {
            Get-ChildItem -Path dist | Format-Table Name, Length -AutoSize
          } else {
            Write-Warning "dist directory does not exist!"
          }

      - name: Delete stale installer assets from existing release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          $json = gh release view $tag --repo '${{ github.repository }}' --json assets 2>$null
          if ($json) {
            ($json | ConvertFrom-Json).assets |
              Where-Object { $_.name -like '*-Setup.exe' } |
              ForEach-Object {
                Write-Host "Removing stale installer asset: $($_.name)"
                gh release delete-asset $tag $_.name --repo '${{ github.repository }}' --yes
              }
          } else {
            Write-Host "No existing release found for $tag — skipping cleanup."
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Orbital ${{ steps.version.outputs.tag }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/Orbital-*-Setup.exe
            dist/Orbital-*-Portable.zip
