name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          # Determine if pre-release (contains -, e.g. v1.0.0-beta.1)
          if [[ "$VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version in csproj
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          $content = Get-Content Orbital.csproj -Raw
          $content = $content -replace '<Version>.*?</Version>', "<Version>$ver</Version>"
          $content = $content -replace '<AssemblyVersion>.*?</AssemblyVersion>', "<AssemblyVersion>$ver.0</AssemblyVersion>"
          $content = $content -replace '<FileVersion>.*?</FileVersion>', "<FileVersion>$ver.0</FileVersion>"
          Set-Content Orbital.csproj $content

      # ---------- Build (self-contained single-file) ----------
      - name: Publish
        run: |
          dotnet publish Orbital.csproj /p:PublishProfile=installer --configuration Release --output publish/installer

      # ---------- Package with Velopack ----------
      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Package with Velopack
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          vpk pack `
            --packId Orbital `
            --packVersion $ver `
            --packDir publish/installer `
            --packTitle "Orbital" `
            --mainExe Orbital.exe `
            --icon Assets/orbit_logo.ico `
            --outputDir dist
          # Rename bootstrapper if vpk used a different naming pattern
          $setup = Get-ChildItem dist -Filter '*Setup*.exe' | Select-Object -First 1
          if ($setup -and $setup.Name -ne 'OrbitalSetup.exe') {
            Rename-Item $setup.FullName 'OrbitalSetup.exe'
          }

      # ---------- Build portable (self-contained multi-file) ----------
      - name: Publish portable build
        run: |
          dotnet publish Orbital.csproj /p:PublishProfile=portable --configuration Release --output publish/portable

      - name: Package portable zip
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          $folder = "Orbital-$ver"
          $staging = "publish/staging/$folder"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item publish/portable/Orbital.exe $staging
          Copy-Item portable/Cleanup.cmd $staging
          Compress-Archive -Path "publish/staging/$folder" -DestinationPath "dist/Orbital-$ver-Portable.zip"

      # ---------- Create GitHub Release ----------
      - name: List dist artifacts
        shell: pwsh
        run: |
          Write-Host "=== dist directory contents ==="
          if (Test-Path dist) {
            Get-ChildItem -Path dist | Format-Table Name, Length -AutoSize
          } else {
            Write-Warning "dist directory does not exist!"
          }

      - name: Delete stale assets from existing release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          $json = gh release view $tag --repo '${{ github.repository }}' --json assets 2>$null
          if ($LASTEXITCODE -eq 0 -and $json) {
            ($json | ConvertFrom-Json).assets |
              Where-Object { $_.name -like '*Setup.exe' -or $_.name -like '*.nupkg' -or $_.name -eq 'RELEASES' } |
              ForEach-Object {
                Write-Host "Removing stale asset: $($_.name)"
                gh release delete-asset $tag $_.name --repo '${{ github.repository }}' --yes
              }
          } else {
            Write-Host "No existing release found for $tag — skipping cleanup."
          }
          $global:LASTEXITCODE = 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Orbital ${{ steps.version.outputs.tag }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/RELEASES
            dist/releases.win.json
            dist/assets.win.json
            dist/Orbital-*-full.nupkg
            dist/OrbitalSetup.exe
            dist/Orbital-*-Portable.zip
