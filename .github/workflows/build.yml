name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Orbit.csproj

      - name: Build
        run: dotnet build Orbit.csproj --no-restore --configuration Release

      - name: Restore test dependencies
        run: dotnet restore Orbit.Tests/Orbit.Tests.csproj

      - name: Build tests
        run: dotnet build Orbit.Tests/Orbit.Tests.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test Orbit.Tests/Orbit.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orbit-${{ github.sha }}
          path: bin/Release/net8.0-windows/
          retention-days: 14
